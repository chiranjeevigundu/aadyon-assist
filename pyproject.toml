# Tool configuration only — the app is deployed via Docker + pip (code/api/requirements.txt),
# not packaged. Runtime deps stay pinned there; dev tools in code/api/requirements-dev.txt.

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["mobile"]

[tool.ruff.lint]
# Real-bug rules only, no style churn: E9 (syntax), F (pyflakes), B (bugbear).
select = ["E9", "F", "B"]
# B008: `Depends(...)` in argument defaults is the core FastAPI idiom.
ignore = ["B008"]

[tool.pytest.ini_options]
pythonpath = ["code/api", "scripts"]
testpaths = ["tests"]
addopts = "-q"
