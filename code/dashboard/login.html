<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - Aadyon Assist</title>
<link rel="stylesheet" href="/static/assets/base.css">
<style>
  body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: var(--bg); }
  .login-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 32px; width: 100%; max-width: 400px; box-sizing: border-box; }
  .login-card h1 { font-size: 24px; margin: 0 0 8px; font-weight: 600; text-align: center; }
  .login-card .sub { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .form-group input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; color: var(--text); font-size: 15px; box-sizing: border-box; }
  .form-group input:focus { outline: none; border-color: var(--accent); }
  .btn { width: 100%; padding: 12px; background: var(--accent); color: #06122a; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn:hover { opacity: 0.9; }
  .error { color: var(--red); font-size: 13px; text-align: center; margin-bottom: 16px; display: none; }
</style>
</head>
<body>

<div class="login-card">
  <h1>Aadyon Assist</h1>
  <div class="sub">Log in to your Life-ops platform</div>
  
  <div id="error-msg" class="error"></div>
  
  <form id="login-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn">Log In</button>
  </form>
</div>

<script src="/static/assets/base.js"></script>
<script>
  if (getToken()) {
    window.location.href = '/';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');
    const btn = e.target.querySelector('button');
    
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.innerText = 'Logging in...';
    
    try {
      // No redirect loop issue here since it handles auth
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      const data = await res.json();
      
      if (!res.ok) {
        throw new Error(data.detail || 'Login failed');
      }
      
      setToken(data.token);
      window.location.href = '/';
      
    } catch (err) {
      errEl.innerText = err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerText = 'Log In';
    }
  });
</script>
</body>
</html>
