<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assistant · Aadyon Assist</title>
<link rel="stylesheet" href="/static/assets/base.css">
<style>
  header { padding: 16px 22px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 13px; }
  
  .layout { display: flex; height: calc(100vh - 65px - env(safe-area-inset-top) - env(safe-area-inset-bottom)); overflow: hidden; }
  
  .sidebar { width: 300px; background: var(--bg); border-right: 1px solid var(--line); display: flex; flex-direction: column; }
  .sidebar-header { padding: 14px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .sidebar-header h2 { margin: 0; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  
  .conv-list { flex: 1; overflow-y: auto; padding: 10px; }
  .conv-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; transition: background 0.1s; }
  .conv-item:hover { background: var(--panel); }
  .conv-item.active { background: var(--panel2); border: 1px solid var(--line); }
  .conv-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .conv-date { font-size: 11px; color: var(--muted); }
  
  .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--panel); position: relative; }
  .chat-history { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 16px; }
  
  .msg { max-width: 80%; display: flex; flex-direction: column; gap: 4px; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  
  .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user .msg-bubble { background: var(--accent); color: #0d1117; border-bottom-right-radius: 2px; font-weight: 500; }
  .msg.assistant .msg-bubble { background: var(--panel2); border: 1px solid var(--line); border-bottom-left-radius: 2px; }
  
  .tool-call { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 10px; font-size: 12px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; color: var(--muted); margin-bottom: 8px; }
  .meta { color: var(--green); font-size: 12px; margin-top: 4px; margin-left: 4px; }
  .proposal { color: var(--amber); font-size: 12px; margin-top: 4px; margin-left: 4px; line-height: 1.3; }
  
  .chat-input { padding: 16px 22px; border-top: 1px solid var(--line); background: var(--bg); display: flex; gap: 12px; align-items: flex-end; }
  .chat-input textarea { flex: 1; background: var(--panel); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 12px; font: inherit; min-height: 48px; max-height: 200px; resize: none; overflow-y: auto; }
  .chat-input textarea:focus { outline: none; border-color: var(--accent); }
  .chat-input button { height: 48px; padding: 0 20px; flex-shrink: 0; }
  
  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: 35%; border-right: none; border-bottom: 1px solid var(--line); }
    .chat-area { height: 65%; }
    .msg { max-width: 90%; }
  }
</style>
</head>
<body>
<header>
  <div><h1>Assistant</h1><div class="sub">Aadyon Assist · Chat with Aadyon Assist</div></div>
  <nav data-nav></nav>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Conversations</h2>
      <button class="btn ghost sm" id="newChatBtn" style="padding: 4px 10px; font-size: 12px;">+ New</button>
    </div>
    <div class="conv-list" id="convList">
      <div class="empty" style="text-align: center; margin-top: 20px;">Loading...</div>
    </div>
  </div>
  <div class="chat-area">
    <div class="chat-history" id="chatHistory">
      <div class="empty" style="text-align: center; margin-top: 40px;">Select or start a conversation to begin chatting.</div>
    </div>
    <div class="chat-input">
      <input type="file" id="fileUpload" accept="image/*,application/pdf" style="display:none">
      <button class="btn ghost" id="uploadBtn" style="padding: 0; width: 48px; flex-shrink: 0; font-size: 24px; font-weight: 300; color: var(--muted); border-radius: 24px;">+</button>
      <textarea id="chatInput" placeholder="Send a message to Aadyon..."></textarea>
      <button class="btn" id="sendBtn">Send</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="/static/assets/base.js"></script>
<script src="/static/assets/assistant.js"></script>
</body>
</html>
