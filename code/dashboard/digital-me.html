<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Digital Me · Aadyon Assist</title>
<link rel="stylesheet" href="/static/assets/base.css">
<style>
  header{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  header h1{font-size:18px;margin:0;font-weight:600;letter-spacing:.01em}
  header .sub{color:var(--muted);font-size:13px}
  main{max-width:1120px;margin:0 auto;padding:24px;display:grid;gap:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .card h2{margin:0 0 14px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}

  /* identity */
  .id{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .avatar{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--violet));
    display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#0d1117;flex:0 0 auto}
  .id .name{font-size:22px;font-weight:700;line-height:1.1}
  .id .head{color:var(--muted);font-size:13px;margin-top:3px}
  .id .meta{margin-top:6px;font-size:13px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
  .id .meta b{color:var(--text);font-weight:600}

  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600}

  /* score ring */
  .ring{--p:0;--c:var(--accent);width:96px;height:96px;border-radius:50%;flex:0 0 auto;
    background:conic-gradient(var(--c) calc(var(--p)*1%), var(--line) 0);
    display:flex;align-items:center;justify-content:center}
  .ring .inner{width:74px;height:74px;border-radius:50%;background:var(--panel);
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .inner .n{font-size:26px;font-weight:800;line-height:1}
  .ring .inner .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

  /* overall hero */
  .hero{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .dims{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex:1;min-width:300px}
  /* Phones: let .dims shrink to fit (the 300px floor was overflowing the card),
     and tighten the big-stat layout so nothing runs past the screen edge. */
  @media(max-width:760px){
    .dims{grid-template-columns:repeat(2,1fr);min-width:0;flex:1 1 100%}
  }
  @media(max-width:520px){
    .hero{gap:16px}
    .bigstats{gap:16px 20px}
    .big .v{font-size:32px}
    .stats{gap:16px 22px}
  }
  .dim{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px}
  .dim .t{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .dim .s{font-size:26px;font-weight:800;line-height:1.1;margin-top:2px;font-variant-numeric:tabular-nums}
  .dim .b{font-size:11px;margin-top:2px}

  /* big stats */
  .bigstats{display:flex;gap:34px;flex-wrap:wrap}
  .big{display:flex;flex-direction:column}
  .big .v{font-size:40px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .big .k{font-size:12px;color:var(--muted);margin-top:4px}
  .stat .v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat .k{font-size:12px;color:var(--muted)}
  .stats{display:flex;gap:26px;flex-wrap:wrap}

  /* bars */
  .bar{height:8px;border-radius:5px;background:var(--line);overflow:hidden;margin-top:6px}
  .bar>span{display:block;height:100%;border-radius:5px}
  .barlbl{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:12px}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
  td.num{text-align:right;font-variant-numeric:tabular-nums}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:860px){.grid2{grid-template-columns:1fr}}

  .comp{display:flex;gap:18px;flex-wrap:wrap;margin-top:4px}
  .comp .c{font-size:12px;color:var(--muted)}
  .comp .c b{color:var(--text);font-size:15px;font-weight:700}

  /* timeline */
  .tl{list-style:none;margin:0;padding:0}
  .tl li{position:relative;padding:0 0 14px 20px;border-left:2px solid var(--line)}
  .tl li:last-child{border-left-color:transparent}
  .tl li::before{content:"";position:absolute;left:-6px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .tl li.goal::before{background:var(--violet)}
  .tl .d{font-size:12px;color:var(--muted)}
  .tl .ti{font-size:14px;font-weight:600}
  .goalrow{margin-bottom:14px}
  .goalrow .top{display:flex;justify-content:space-between;font-size:14px}

  footer{max-width:1120px;margin:0 auto;padding:0 24px 36px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<header>
  <div><h1>Digital&nbsp;Me</h1><div class="sub">Aadyon Assist · a living model of you</div></div>
  <nav>
    <span class="sub" id="asof"></span>
    <span data-nav></span>
    <a href="#" onclick="load();return false">Refresh</a>
  </nav>
</header>
<main id="app"><div class="card">Loading…</div></main>
<footer>This is a mirror, not a magic wand. The scores move only when the real numbers do — a better job, a filed I-765, a paid-down balance. Edit data via the <a href="/docs" target="_blank">API</a> or the tracker importer.</footer>

<script src="/static/assets/base.js"></script>
<script src="/static/assets/digital-me.js"></script>
</body>
</html>
