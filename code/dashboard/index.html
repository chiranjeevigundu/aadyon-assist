<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aadyon Assist</title>
<link rel="stylesheet" href="/static/assets/base.css">
<style>
  header{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  header h1{font-size:18px;margin:0;font-weight:600}
  header .sub{color:var(--muted);font-size:13px}
  main{max-width:1100px;margin:0 auto;padding:24px;display:grid;gap:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px}
  .card h2{margin:0 0 12px;font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .hero{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .count{font-size:54px;font-weight:700;line-height:1}
  .count.red{color:var(--red)} .count.amber{color:var(--amber)} .count.green{color:var(--green)}
  .hero .label{font-size:13px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:600}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .v{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat .k{font-size:12px;color:var(--muted)}
  .stats{display:flex;gap:28px;flex-wrap:wrap}
  a{color:var(--accent)}
  .bar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:4px}
  .bar>span{display:block;height:100%}
  footer{max-width:1100px;margin:0 auto;padding:0 24px 32px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<header>
  <div><h1>Aadyon Assist</h1><div class="sub">Life-ops tracker · Phase 1</div></div>
  <div class="sub"><a href="/">← Digital Me</a> · <a href="/agency">Agency</a> · <a href="/accounts">Accounts</a> · <a href="/data">Data admin</a> · <a href="/docs" target="_blank">API docs</a> · <a href="#" onclick="load();return false">Refresh</a></div>
</header>
<main id="app"><div class="card">Loading…</div></main>
<footer>Read-only view. The numbers don't change because this exists — only real-world actions do.</footer>

<script src="/static/assets/base.js"></script>
<script>
// Shared helpers ($, esc, money2) come from base.js. This page formats money with
// two decimals, i.e. base.js `money2`.
function dlClass(days){ if(days==null) return 'muted'; if(days<=7) return 'red'; if(days<=21) return 'amber'; return 'green'; }
function utilClass(p){ if(p==null) return 'muted'; if(p>=90) return 'red'; if(p>=50) return 'amber'; return 'green'; }
function utilColor(p){ if(p>=90) return 'var(--red)'; if(p>=50) return 'var(--amber)'; return 'var(--green)'; }

async function load(){
  const app = document.getElementById('app');
  let d;
  try { d = await (await fetch('/api/summary')).json(); }
  catch(e){ app.innerHTML = '<div class="card">API not reachable. Is the stack up? <code>docker compose up -d</code></div>'; return; }
  app.innerHTML='';

  // --- Visa / top deadline hero ---
  const next = (d.deadlines||[])[0];
  if(next){
    const days = next.days_left;
    app.append($(`<div class="card"><div class="hero">
      <div><div class="count ${dlClass(days)}">${days==null?'—':days}</div><div class="label">days left</div></div>
      <div style="flex:1;min-width:220px">
        <div style="font-size:17px;font-weight:600">${esc(next.title)}</div>
        <div class="sub" style="color:var(--muted);margin-top:4px">Due ${esc(next.due_date)} ·
          <span class="pill ${next.status==='blocked'?'amber':'muted'}">${esc(next.status)}</span></div>
        ${next.blocked_on?`<div style="margin-top:6px;color:var(--amber)">⛔ Blocked on: ${esc(next.blocked_on)}</div>`:''}
        ${next.notes?`<div style="margin-top:6px;color:var(--muted);font-size:13px">${esc(next.notes)}</div>`:''}
      </div></div></div>`));
  }

  // --- All deadlines ---
  const dls = d.deadlines||[];
  const dlRows = dls.map(x=>`<tr>
      <td>${esc(x.title)}</td><td>${esc(x.due_date)}</td>
      <td class="num"><span class="pill ${dlClass(x.days_left)}">${x.days_left==null?'—':x.days_left+'d'}</span></td>
      <td><span class="pill ${x.status==='blocked'?'amber':'muted'}">${esc(x.status)}</span></td>
      <td>${esc(x.blocked_on||'')}</td></tr>`).join('');
  app.append($(`<div class="card"><h2>Deadlines</h2>
    ${dls.length?`<table><thead><tr><th>Item</th><th>Due</th><th>Left</th><th>Status</th><th>Blocked on</th></tr></thead><tbody>${dlRows}</tbody></table>`:'<div class="empty">No deadlines.</div>'}</div>`));

  // --- Debts ---
  const t = d.debt_totals||{};
  const debtRows = (d.debts||[]).map(x=>{
    const u = x.utilization_pct;
    return `<tr>
      <td>${esc(x.name)} ${x.priority_rank?`<span class="pill muted">#${x.priority_rank}</span>`:''}</td>
      <td class="num">${money2(x.balance)}</td>
      <td class="num">${Number(x.apr).toFixed(2)}%</td>
      <td class="num">${money2(x.min_payment)}</td>
      <td class="num">${money2(x.est_monthly_interest)}</td>
      <td>${u==null?'<span class="empty">—</span>':`<span class="pill ${utilClass(u)}">${u}%</span><div class="bar"><span style="width:${Math.min(u,100)}%;background:${utilColor(u)}"></span></div>`}</td>
    </tr>`;}).join('');
  app.append($(`<div class="card"><h2>Debts · payoff order</h2>
    <div class="stats" style="margin-bottom:14px">
      <div class="stat"><span class="v">${money2(t.total_debt)}</span><span class="k">Total debt</span></div>
      <div class="stat"><span class="v">${money2(t.total_min_payments)}</span><span class="k">Monthly minimums</span></div>
      <div class="stat"><span class="v" style="color:var(--red)">${money2(t.est_monthly_interest)}</span><span class="k">Interest / month</span></div>
      <div class="stat"><span class="v" style="color:var(--red)">${money2(t.est_annual_interest)}</span><span class="k">Interest / year</span></div>
    </div>
    <table><thead><tr><th>Debt</th><th class="num">Balance</th><th class="num">APR</th><th class="num">Min</th><th class="num">Int/mo</th><th>Utilization</th></tr></thead>
    <tbody>${debtRows||'<tr><td colspan=6 class="empty">No debts.</td></tr>'}</tbody></table></div>`));

  // --- Bills / Subscriptions / Shifts ---
  const section = (title, rows, head, body)=>`<div class="card"><h2>${title}</h2>${rows.length?`<table><thead>${head}</thead><tbody>${body}</tbody></table>`:'<div class="empty">Nothing yet — add via the API.</div>'}</div>`;
  const wrap = $('<div class="grid2"></div>');
  wrap.append($(section('Bills', d.bills||[],
    '<tr><th>Name</th><th class="num">Amount</th><th>Due</th></tr>',
    (d.bills||[]).map(b=>`<tr><td>${esc(b.name)}</td><td class="num">${money2(b.amount)}</td><td>${b.due_day?'day '+b.due_day:esc(b.frequency)}</td></tr>`).join(''))));
  wrap.append($(section('Subscriptions', d.subscriptions||[],
    '<tr><th>Name</th><th class="num">Amount</th><th>Renews</th></tr>',
    (d.subscriptions||[]).map(s=>`<tr><td>${esc(s.name)}</td><td class="num">${money2(s.amount)}</td><td>${esc(s.renews_on||s.billing_cycle)}</td></tr>`).join(''))));
  app.append(wrap);

  app.append($(section('Recent shifts', d.shifts||[],
    '<tr><th>Date</th><th>Employer</th><th class="num">Hours</th><th class="num">Est. pay</th><th>Status</th></tr>',
    (d.shifts||[]).map(s=>`<tr><td>${esc(s.shift_date)}</td><td>${esc(s.employer)}</td><td class="num">${s.hours??'—'}</td><td class="num">${money2(s.est_pay)}</td><td><span class="pill muted">${esc(s.status)}</span></td></tr>`).join(''))));
}
load();
</script>
</body>
</html>
