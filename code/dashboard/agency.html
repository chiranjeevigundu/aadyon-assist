<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agency · Aadyon Assist</title>
<link rel="stylesheet" href="/static/assets/base.css">
<style>
  header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  header h1{font-size:17px;margin:0;font-weight:600}
  header .sub{color:var(--muted);font-size:13px}
  main{max-width:1140px;margin:0 auto;padding:22px;display:grid;gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .card h2{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .pill{display:inline-block;padding:1px 8px;border-radius:999px;font-size:12px;font-weight:600;background:var(--line);color:var(--muted)}
  .health{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .ok{background:var(--green)} .bad{background:var(--red)}
  textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:10px;font:inherit;min-height:64px;resize:vertical}
  button.btn.green{background:var(--green);color:#08130b} button.btn.red{background:var(--red);color:#fff}
  button.btn.sm{padding:3px 9px;font-size:12px}
  /* org chart */
  .ceo{background:linear-gradient(135deg,var(--accent),var(--violet));color:#0d1117;border-radius:10px;padding:10px 14px;font-weight:700;display:inline-block}
  .teams{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:12px}
  @media(max-width:860px){.teams{grid-template-columns:repeat(2,1fr)}}
  .team{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px}
  .team .tn{font-weight:700;font-size:14px}
  .team .mi{color:var(--muted);font-size:12px;margin:4px 0 8px}
  .emp{font-size:13px;padding:3px 0;border-top:1px solid var(--line)}
  .emp .t{color:var(--muted);font-size:11px}
  /* tasks */
  .task{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--panel2)}
  .task .top{display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer}
  .task .ti{font-weight:600}
  .task .meta{color:var(--muted);font-size:12px}
  .task .body{margin-top:8px;border-top:1px solid var(--line);padding-top:8px;display:none}
  .task.open .body{display:block}
  .result{white-space:pre-wrap;font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:6px}
  .run{font-size:12px;color:var(--muted);border-left:2px solid var(--line);padding:2px 0 8px 10px;margin-left:4px}
  .run b{color:var(--text)}
</style>
</head>
<body>
<header>
  <div><h1>Agency</h1><div class="sub">Aadyon Assist · CEO → teams → employees, powered by routed models</div></div>
  <nav data-nav></nav>
</header>
<main>
  <div class="card">
    <h2>Model routing &amp; status</h2>
    <div class="health" id="health"><span class="empty">Checking…</span></div>
  </div>

  <div class="card">
    <h2>Ask the CEO</h2>
    <textarea id="goal" placeholder="e.g. What should I focus on this week to fix the debt and visa situation?"></textarea>
    <div style="margin-top:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <button class="btn" id="askBtn">Delegate to the org</button>
      <span class="meta" id="askNote" style="color:var(--muted);font-size:12px"></span>
    </div>
  </div>

  <div class="card"><h2>Org chart</h2><div id="org"><span class="empty">Loading…</span></div></div>

  <div class="card">
    <h2>Task queue &amp; approvals</h2>
    <div id="tasks"><span class="empty">Loading…</span></div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script src="/static/assets/base.js"></script>
<script src="/static/assets/agency.js"></script>
</body>
</html>
