name: Bug report
description: Something broke or behaves unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `just up`
        2. POST /api/...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. main @ abc1234
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`just logs api` output, stack traces, etc. Redact anything personal."
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I confirmed this report contains no personal, financial, or immigration data
          required: true
