name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff (rules from pyproject.toml)
        run: |
          pip install -r code/api/requirements-dev.txt
          ruff check .
      - name: Dashboard JS syntax (Biome)
        run: npx @biomejs/biome ci code/dashboard/assets
      - name: Validate docker-compose
        run: |
          mkdir -p secrets && printf 'ci' > secrets/db_password.txt
          printf 'ci' > secrets/jwt_secret.txt
          printf 'ci' > secrets/s3_access_key.txt
          printf 'ci' > secrets/s3_secret_key.txt
          printf 'POSTGRES_USER=aadyon\nPOSTGRES_DB=aadyon_assist\nAPI_PORT=8000\nTZ=UTC\n' > .env
          docker compose config -q
          echo "compose config valid"

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  smoke:
    name: Build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create throwaway env + secrets (no real data)
        run: |
          mkdir -p secrets
          printf 'ci-test-password' > secrets/db_password.txt
          printf 'ci-test-jwt-secret' > secrets/jwt_secret.txt
          printf 'ci' > secrets/s3_access_key.txt
          printf 'ci' > secrets/s3_secret_key.txt
          printf 'POSTGRES_USER=aadyon\nPOSTGRES_DB=aadyon_assist\nAPI_PORT=8000\nTZ=UTC\n' > .env
      - name: Build & start db + migrations + api (healthcheck-gated)
        run: docker compose up -d --build --wait db migrate api
      - name: "Hit key endpoints (multi-user: sign up, then use the token)"
        run: |
          set -e
          B=http://localhost:8000
          # health is public
          curl -fsS "$B/api/health" | grep -q '"db":"up"'
          # unauthenticated data access must be rejected
          code=$(curl -s -o /dev/null -w '%{http_code}' "$B/api/summary")
          [ "$code" = "401" ] || { echo "expected 401 for unauth, got $code"; exit 1; }
          # sign up a throwaway user; the account gets its own seeded org
          TOKEN=$(curl -fsS -X POST "$B/api/auth/signup" -H 'Content-Type: application/json' \
            -d '{"email":"ci@example.com","password":"ci-password-123","display_name":"CI"}' \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["token"])')
          [ -n "$TOKEN" ] || { echo "no token from signup"; exit 1; }
          echo "TOKEN=$TOKEN" >> "$GITHUB_ENV"
          AUTH="Authorization: Bearer $TOKEN"
          curl -fsS -H "$AUTH" "$B/api/digital-me"  >/dev/null
          curl -fsS -H "$AUTH" "$B/api/entities"    >/dev/null
          curl -fsS -H "$AUTH" "$B/api/agency/org"   | grep -q 'Aadyon CEO'
          curl -fsS -H "$AUTH" "$B/api/agency/health" >/dev/null
          curl -fsS -H "$AUTH" "$B/api/summary"      >/dev/null
          curl -fsS -H "$AUTH" "$B/api/email/extractions?status=pending" >/dev/null
          curl -fsS -H "$AUTH" "$B/api/deadlines"    >/dev/null
          curl -fsS -H "$AUTH" "$B/api/briefing"     >/dev/null
          curl -fsS -H "$AUTH" "$B/api/assistant/conversations" >/dev/null
          echo "Smoke test passed."
      - name: API contract fuzz (Schemathesis, all endpoints)
        run: |
          pip install schemathesis==4.22.2
          schemathesis run http://localhost:8000/openapi.json \
            --header "Authorization: Bearer $TOKEN" \
            --checks not_a_server_error \
            --max-examples 25
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
      - name: Teardown
        if: always()
        run: docker compose down -v

  tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -r code/api/requirements-dev.txt
      - name: Run pytest (imports + pure logic, no DB needed)
        run: pytest
